<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CB Forge Roster</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="shell">
    <aside class="panel sidebar">
      <div class="hero">
        <div class="eyebrow">CB Forge</div>
        <h1>Roster Control</h1>
        <p class="subtext">Gestione locale dei tuoi campioni, con refresh del database e sincronizzazione opzionale di dati esterni direttamente da qui.</p>
        <div class="nav-links">
          <a class="nav-link active" href="/">Campioni</a>
          <a class="nav-link" href="/gear">Equip</a>
          <a class="nav-link" href="/build">Build</a>
        </div>
      </div>
      <div class="toolbar">
        <input id="search" type="search" placeholder="Cerca campione...">
        <select id="scope">
          <option value="all">Tutti i posseduti</option>
          <option value="target">Solo target livello 60</option>
          <option value="missing">Solo dati skill incompleti</option>
        </select>
        <select id="sort">
          <option value="power">Ordina per livello/rank</option>
          <option value="name">Ordina per nome</option>
        </select>
      </div>
      <div id="sidebarStatus" class="status"></div>
      <div id="roster" class="roster"></div>
    </aside>

    <main class="panel main">
      <section id="summary" class="summary"></section>
      <section class="main-toolbar">
        <button id="rebuildBtn" class="warn">Ricostruisci DB</button>
        <button id="recomputeStatsBtn" class="ghost">Ricalcola Stats</button>
        <button id="refreshAllBtn" class="primary">Aggiorna dati esterni target</button>
        <button id="refreshOneBtn" class="ghost">Aggiorna dati esterni campione</button>
        <button id="reloadBtn" class="ghost">Ricarica vista</button>
      </section>
      <section id="details" class="details">
        <div class="empty">Seleziona un campione dalla lista per vedere stats, skill ed effetti.</div>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
